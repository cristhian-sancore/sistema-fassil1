<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{$Info['title']}</title>
    <meta content='width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no' name='viewport'>
    <link rel="shortcut icon"       href="{$urlBase}img/favicon.png"/>
    <link href="bootstrap/css/bootstrap.min.css" rel="stylesheet" type="text/css"/>
    <link href="css/AdminLTE.css" rel="stylesheet" type="text/css"/>
    <link href="css/zys.css" rel="stylesheet" type="text/css"/>
    <!-- FontAwesome 4.3.0 -->
    <link href="font-awesome/css/font-awesome.min.css" rel="stylesheet" type="text/css" />


    <!--[if lt IE 9]>
    <script src="js/html5shiv.js"></script>
    <![endif]-->

    <!--RECAPTCHA https://www.google.com/recaptcha/api.js-->
    <script src=''></script>
</head>
<body class="login-page">
<div class="login-box">
    <div class="login_logo">
        <a href="{$urlSite}"><img src="img/logo.png"></a>
    </div>
    <div class="login-box-body">
        <form name="login" method="post" enctype="multipart/form-data" class="form_">
            <input type="hidden" value="{$urlBase}" id="url">

            <div class="form-group has-feedback">
                <input type="text" name="login" id="login" class="form-control" placeholder="Usuário" autocomplete="off"/>
                <span class="glyphicon glyphicon-user form-control-feedback"></span>
            </div>
            <div class="form-group has-feedback">
                <input type="password" name="senha" id="senha" class="form-control" placeholder="Password"/>
                <span class="glyphicon glyphicon-lock form-control-feedback"></span>
            </div>

            <div class="g-recaptcha" data-sitekey="6LfQATAUAAAAAPyDk0lkMYKxecwfglps4ix45a4t"></div>
            <p class="error_captcha"></p>

            <div class="row">
                <div class="col-xs-12">
                    <button type="submit" name="logar" id="logar" class="btn btn-primary btn-block btn-flat"><i class="fa fa-lock"></i> ACESSAR</button>
                </div>
            </div>
        </form>
    </div>
</div>

<script src="plugins/jQuery/jQuery-2.1.3.min.js"></script>
<script src="bootstrap/js/bootstrap.min.js" type="text/javascript"></script>
<script src="js/modulos/geral.js"></script>
<script src="js/modulos/login.js"></script>

</body>

{if $Erro}
<div class="ajax_reponse" style="display: block;">
    <span class="ajax_reponse_close">Fechar</span>
    <div class="trigger {$Erro.class}">
        <b>{$Erro.titulo}</b>: {$Erro.msg}
    </div>
</div>
{/if}

</html>
