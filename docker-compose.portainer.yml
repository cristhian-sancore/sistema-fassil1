version: '3.8'

services:
  app:
    # A imagem pré-compilada é puxada diretamente do GitHub Container Registry (ghcr.io)
    # Evita que o servidor do Portainer tente compilar o Dockerfile localmente gasta CPU/memória.
    image: ghcr.io/cristhian-sancore/sistema-fassil1:latest
    container_name: grupofas_app
    restart: always
    ports:
      - "8055:80"
    volumes:
      # Apenas as pastas de anexos históricos são montadas no host/volume para persistência contínua
      - ./public_html/gerenciar/midias:/var/www/html/public_html/gerenciar/midias
      - ./public_html/documentos:/var/www/html/public_html/documentos
    environment:
      - DB_HOST=db
      - DB_USER=grupofas_admin
      - DB_PASS=fassil3017#
      - DB_NAME=grupofas_sistema
    depends_on:
      - db

  db:
    image: mysql:5.7
    container_name: grupofas_db
    restart: always
    command: --sql-mode="" --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword # Senha de root interna do MySQL
      MYSQL_DATABASE: grupofas_sistema
      MYSQL_USER: grupofas_admin
      MYSQL_PASSWORD: fassil3017#
    ports:
      - "33060:3306" # Mapeando a porta do MySQL para 33060 externa
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d # Importação automática do dump
      - db_data:/var/lib/mysql

volumes:
  db_data:
